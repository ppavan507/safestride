<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>SafeStride Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg:     #09090f;
    --bg2:    #0f0f1a;
    --bg3:    #141420;
    --card:   #13131f;
    --border: #1e1e30;
    --g:      #00e87a;
    --b:      #1a6fff;
    --o:      #ff8c1a;
    --r:      #ff2233;
    --dim:    #5a5a72;
    --txt:    #e8e8f2;
    --txt2:   #9090aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--txt);
    font-family: 'Space Grotesk', sans-serif;
    height: 100%;
    overflow: hidden;
  }

  /* ── Screens ─────────────────────────────────────── */
  .screen {
    display: none; flex-direction: column;
    height: 100vh; height: 100dvh;
    overflow-y: auto;
    animation: fadeIn 0.2s ease;
  }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  /* ── Common UI ──────────────────────────────────── */
  .header {
    background: var(--bg2);
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo     { font-size: 40px; font-weight: 700; color: var(--g); letter-spacing: -1px; }
  .logo-sub { font-size: 12px; color: var(--dim); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

  .topbar {
    background: var(--bg2);
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .body-pad { padding: 20px; display: flex; flex-direction: column; gap: 14px; flex: 1; }

  label.lbl {
    font-size: 11px; letter-spacing: 1.5px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 4px; display: block;
  }

  input.inp {
    width: 100%; background: var(--bg3); color: var(--txt);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 13px 15px; font-size: 15px; font-family: var(--font);
    outline: none; transition: border-color 0.15s;
  }
  input.inp:focus { border-color: var(--b); }
  input.inp::placeholder { color: var(--dim); }

  .btn {
    border: none; cursor: pointer; border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 15px; padding: 15px 18px; color: #fff;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap; text-align: center; touch-action: manipulation;
  }
  .btn:hover   { opacity: 0.88; }
  .btn:active  { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  .btn-g   { background: var(--g);  color: #000; }
  .btn-b   { background: var(--b); }
  .btn-o   { background: var(--o); }
  .btn-r   { background: var(--r); }
  .btn-dim { background: var(--bg3); color: var(--txt2); border: 1px solid var(--border); }
  .btn-full { width: 100%; font-size: 17px; padding: 17px; }

  .err { color: var(--r); font-size: 13px; min-height: 20px; }
  .row { display: flex; gap: 8px; align-items: center; }
  .flex1 { flex: 1; min-width: 0; }

  /* ── Menu buttons ────────────────────────────────── */
  .menu-btn {
    display: flex; align-items: center; gap: 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 20px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    text-align: left; width: 100%; font-family: 'Space Grotesk', sans-serif;
  }
  .menu-btn:hover { border-color: var(--b); background: #141425; }
  .menu-icon  { font-size: 26px; }
  .menu-label { font-size: 17px; font-weight: 600; color: var(--txt); }
  .menu-desc  { font-size: 12px; color: var(--dim); margin-top: 2px; }
  .user-pill  {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(26,111,255,0.12); border: 1px solid rgba(26,111,255,0.25);
    border-radius: 20px; padding: 4px 12px; font-size: 13px; color: var(--b);
  }
  .divider-line { height: 1px; background: var(--border); margin: 4px 0; }

  /* ── ANALYZE SCREEN — fullscreen layout ──────────── */
  #s-analyze {
    background: #000;
    overflow: hidden;
  }

  /* Top nav bar */
  .cam-top {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    background: rgba(9,9,15,0.95);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .cam-top input.inp {
    padding: 9px 12px; font-size: 14px;
    background: rgba(20,20,32,0.9);
  }
  .cam-top .btn { padding: 9px 13px; font-size: 13px; }

  /* Camera fills all space between top and bottom bars */
  #cam-wrapper {
    position: relative;
    flex: 1;
    background: #000;
    overflow: hidden;
    min-height: 0;
  }

  #cam-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #cam-canvas { display: none; }

  /* Overlay on camera */
  #cam-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    padding: 24px 14px 8px;
    pointer-events: none;
  }
  #cam-overlay-txt {
    font-size: 13px; font-weight: 600; color: var(--g);
  }
  #cam-status-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--r);
    margin-right: 6px; vertical-align: middle;
  }
  #cam-status-dot.on { background: var(--g); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Flip camera button — floats over camera top-right */
  #flip-btn {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; border-radius: 50%; width: 42px; height: 42px;
    font-size: 20px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 5; transition: background 0.2s;
    touch-action: manipulation;
  }
  #flip-btn:active { background: rgba(255,255,255,0.2); }

  /* Status bar */
  .cam-status-bar {
    background: rgba(9,9,15,0.95);
    border-top: 1px solid var(--border);
    padding: 5px 14px; font-size: 13px;
    color: var(--g); font-weight: 600;
    min-height: 28px; flex-shrink: 0;
  }

  /* Bottom action bar */
  .cam-bottom {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    background: rgba(9,9,15,0.95);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── Caregiver screen ────────────────────────────── */
  .scroll-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  #care-map { width: 100%; height: 260px; border: none; border-radius: 10px; background: var(--bg3); }
  .info-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .info-row  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .info-key  { font-size: 11px; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; }
  .info-val  { font-size: 14px; color: var(--txt); font-family: 'JetBrains Mono', monospace; }
  .online-badge {
    background: rgba(0,232,122,0.1); color: var(--g);
    border: 1px solid rgba(0,232,122,0.3);
    border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600;
  }

  /* ── Toast ───────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 20px; font-size: 14px; color: var(--txt);
    opacity: 0; transition: all 0.25s; z-index: 9999; pointer-events: none;
    max-width: 90vw; text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Mic glow ────────────────────────────────────── */
  .mic-active { animation: micGlow 0.8s infinite alternate; }
  @keyframes micGlow { from{box-shadow:0 0 0 0 rgba(255,140,26,0.5)} to{box-shadow:0 0 0 8px rgba(255,140,26,0)} }

  /* ── SOS ring ────────────────────────────────────── */
  .sos-ring { animation: sosRing 0.4s infinite alternate; }
  @keyframes sosRing { from{box-shadow:0 0 0 0 rgba(255,34,51,0.6)} to{box-shadow:0 0 0 12px rgba(255,34,51,0)} }
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     SCREEN 1 — LOGIN
══════════════════════════════════════ -->
<div class="screen active" id="s-login">
  <div class="header">
    <div class="logo">SafeStride</div>
    <div class="logo-sub">Assistive Navigation System</div>
  </div>
  <div class="body-pad" style="max-width:480px;width:100%;margin:0 auto;">
    <div style="height:8px"></div>
    <div>
      <label class="lbl">Username</label>
      <input class="inp" id="l-user" placeholder="Enter your username" autocomplete="off" autocapitalize="none"/>
    </div>
    <div>
      <label class="lbl">Password</label>
      <input class="inp" id="l-pass" type="password" placeholder="Enter your password"/>
    </div>
    <div class="err" id="l-err"></div>
    <button class="btn btn-b btn-full" onclick="doLogin()">LOGIN</button>
    <button class="btn btn-dim btn-full" onclick="go('s-register')">Create New Account</button>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">
      <div style="font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Server</div>
      <div style="font-size:12px;color:var(--txt2);word-break:break-all;" id="server-display">detecting...</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCREEN 2 — REGISTER
══════════════════════════════════════ -->
<div class="screen" id="s-register">
  <div class="topbar">
    <button class="btn btn-dim" onclick="go('s-login')" style="padding:8px 14px;font-size:13px;">← Back</button>
    <span style="font-size:17px;font-weight:700;color:var(--b)">Create Account</span>
  </div>
  <div class="body-pad" style="max-width:480px;width:100%;margin:0 auto;">
    <div>
      <label class="lbl">Username</label>
      <input class="inp" id="r-user" placeholder="Choose a username" autocomplete="off" autocapitalize="none"/>
    </div>
    <div>
      <label class="lbl">Password</label>
      <input class="inp" id="r-pass" type="password" placeholder="At least 4 characters"/>
    </div>
    <div>
      <label class="lbl">Emergency Contact Email</label>
      <input class="inp" id="r-ec" type="email" placeholder="guardian@gmail.com"/>
    </div>
    <div class="err" id="r-err"></div>
    <button class="btn btn-g btn-full" onclick="doRegister()">REGISTER</button>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">
      <div style="font-size:12px;color:var(--dim);">Emergency contact receives SOS alerts with your live GPS location.</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCREEN 3 — HOME
══════════════════════════════════════ -->
<div class="screen" id="s-home">
  <div class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="logo">SafeStride</div>
        <div class="logo-sub" id="h-welcome">Welcome back</div>
      </div>
      <span class="user-pill">👤 <span id="h-username">User</span></span>
    </div>
  </div>
  <div class="body-pad" style="max-width:480px;width:100%;margin:0 auto;">
    <button class="menu-btn" onclick="go('s-analyze')">
      <span class="menu-icon">👁️</span>
      <div>
        <div class="menu-label" style="color:var(--g)">Navigator &amp; Vision</div>
        <div class="menu-desc">AI scene analysis · Voice mic · Navigation · SOS</div>
      </div>
    </button>
    <button class="menu-btn" onclick="go('s-caregiver')">
      <span class="menu-icon">📍</span>
      <div>
        <div class="menu-label" style="color:var(--b)">Caregiver Tracking</div>
        <div class="menu-desc">Track a user's real-time location on map</div>
      </div>
    </button>
    <div class="divider-line" style="margin:8px 0"></div>
    <button class="btn btn-dim btn-full" onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCREEN 4 — ANALYZE (fullscreen)
══════════════════════════════════════ -->
<div class="screen" id="s-analyze">

  <!-- Top bar -->
  <div class="cam-top">
    <button class="btn btn-dim" onclick="stopAnalyze()" style="padding:9px 11px;font-size:13px;flex-shrink:0">← Home</button>
    <input class="inp flex1" id="a-dest" placeholder="Destination…" autocapitalize="none"/>
    <button class="btn btn-o" id="mic-dest-btn" onclick="listenFor('dest')" style="padding:9px 12px;font-size:15px;flex-shrink:0">🎤</button>
    <button class="btn btn-b" id="go-btn" onclick="getNav()" style="padding:9px 13px;font-size:13px;flex-shrink:0">GO</button>
  </div>

  <!-- Camera — fills all remaining space -->
  <div id="cam-wrapper">
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="cam-canvas"></canvas>

    <!-- Flip camera button floats over camera -->
    <button id="flip-btn" onclick="flipCamera()" title="Switch camera">🔄</button>

    <!-- Status overlay at bottom of camera -->
    <div id="cam-overlay">
      <span id="cam-status-dot"></span>
      <span id="cam-overlay-txt">Camera starting…</span>
    </div>
  </div>

  <!-- Status bar -->
  <div class="cam-status-bar" id="a-status">Press ANALYZE to scan the scene</div>

  <!-- Bottom action bar -->
  <div class="cam-bottom">
    <button class="btn btn-o" id="mode-btn" onclick="toggleMode()" style="padding:12px 12px;font-size:12px;flex-shrink:0">INDOOR</button>
    <button class="btn btn-g flex1" id="analyze-btn" onclick="runAI()" style="font-size:14px;padding:12px 8px">ANALYZE</button>
    <button class="btn btn-o" id="mic-analyze-btn" onclick="listenFor('analyze')" style="padding:12px;font-size:15px;flex-shrink:0">🎤</button>
    <button class="btn btn-r" id="sos-btn" onclick="triggerSOS()" style="padding:12px 13px;font-size:13px;font-weight:800;flex-shrink:0">SOS</button>
  </div>

</div>

<!-- ══════════════════════════════════════
     SCREEN 5 — CAREGIVER
══════════════════════════════════════ -->
<div class="screen" id="s-caregiver">
  <div class="topbar">
    <button class="btn btn-dim" onclick="go('s-home')" style="padding:8px 14px;font-size:13px">← Home</button>
    <span style="font-size:17px;font-weight:700;color:var(--b)">Caregiver Tracking</span>
  </div>
  <div class="scroll-body">
    <div>
      <label class="lbl">Track a User</label>
      <div class="row">
        <input class="inp flex1" id="c-uid" placeholder="Enter username" autocapitalize="none"/>
        <button class="btn btn-g" onclick="fetchTrack()" style="padding:12px 16px;flex-shrink:0">TRACK</button>
        <button class="btn btn-b" id="auto-btn" onclick="toggleAutoRefresh()" style="padding:12px 11px;font-size:13px;flex-shrink:0">AUTO</button>
      </div>
    </div>
    <div class="info-card" id="c-info-card">
      <div style="color:var(--dim);font-size:14px;text-align:center;padding:10px 0">Enter a username and press TRACK</div>
    </div>
    <iframe id="care-map" src="" style="display:none"></iframe>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// SERVER URL — auto-detects based on where the page is opened
// Works on: localhost, ngrok, any domain — no manual editing
// ══════════════════════════════════════════════════════════════
function getServer() {
  const h = window.location.hostname;
  const p = window.location.port;
  const proto = window.location.protocol;

  if (h === 'localhost' || h === '127.0.0.1') {
    // PC: use whatever port the page was served from
    return `http://${h}:${p || 8181}`;
  }
  // ngrok, railway, koyeb, any cloud URL:
  // same origin — API calls go to same server automatically
  return `${proto}//${h}${p ? ':'+p : ''}`;
}

const SERVER = getServer();

// Show server URL on login screen so user can verify
document.getElementById('server-display').textContent = SERVER;

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let currentUser      = '';
let emergencyContact = '';
let currentMode      = 'Indoor';
let camStream        = null;
let currentFacing    = 'environment'; // 'environment'=back, 'user'=front
let isBusy           = false;
let cdTimer          = null;
let autoRefreshTimer = null;
let isListening      = false;

// Demo users (only used if server unreachable)
const DEMO_USERS = { 'demo': { password: 'demo', emergency_contact: '' } };

// ══════════════════════════════════════════════════════════════
// SCREEN NAVIGATION
// ══════════════════════════════════════════════════════════════
function go(id) {
  // Stop camera if leaving analyze screen
  if (document.getElementById('s-analyze').classList.contains('active') && id !== 's-analyze') {
    stopCamera();
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // Start camera when entering analyze screen
  if (id === 's-analyze') startCamera();
}

// ══════════════════════════════════════════════════════════════
// API HELPERS
// ══════════════════════════════════════════════════════════════
async function api(path, data) {
  const r = await fetch(SERVER + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return r.json();
}

async function apiGet(path) {
  const r = await fetch(SERVER + path);
  return r.json();
}

// ══════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════
async function doLogin() {
  const u  = document.getElementById('l-user').value.trim();
  const pw = document.getElementById('l-pass').value.trim();
  const errEl = document.getElementById('l-err');
  errEl.textContent = '';
  if (!u || !pw) { errEl.textContent = 'Enter username and password.'; return; }

  try {
    const res = await api('/api/login', { username: u, password: pw });
    if (res.ok) {
      currentUser = u; emergencyContact = res.emergency_contact || '';
      document.getElementById('h-username').textContent = u;
      document.getElementById('h-welcome').textContent  = `Welcome back, ${u}`;
      go('s-home');
    } else {
      errEl.textContent = res.error || 'Invalid username or password.';
    }
  } catch(e) {
    // Fallback demo mode
    if (DEMO_USERS[u] && DEMO_USERS[u].password === pw) {
      currentUser = u; emergencyContact = '';
      document.getElementById('h-username').textContent = u;
      document.getElementById('h-welcome').textContent  = `Welcome, ${u} (demo)`;
      go('s-home');
    } else {
      errEl.textContent = 'Server unreachable. Check server is running.';
    }
  }
}

// ══════════════════════════════════════════════════════════════
// REGISTER
// ══════════════════════════════════════════════════════════════
async function doRegister() {
  const u  = document.getElementById('r-user').value.trim();
  const pw = document.getElementById('r-pass').value.trim();
  const ec = document.getElementById('r-ec').value.trim();
  const errEl = document.getElementById('r-err');
  errEl.textContent = '';
  if (!u || !pw)     { errEl.textContent = 'Username and password required.'; return; }
  if (pw.length < 4) { errEl.textContent = 'Password must be at least 4 characters.'; return; }

  try {
    const res = await api('/api/register', { username: u, password: pw, emergency_contact: ec });
    if (res.ok) { toast('Account created! You can now login.'); go('s-login'); }
    else errEl.textContent = res.error || 'Registration failed.';
  } catch(e) {
    errEl.textContent = 'Server unreachable. Check server is running.';
  }
}

function doLogout() {
  currentUser = ''; emergencyContact = '';
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
  go('s-login');
}

// ══════════════════════════════════════════════════════════════
// CAMERA  — supports front/back flip
// ══════════════════════════════════════════════════════════════
async function startCamera() {
  stopCamera();
  const dot = document.getElementById('cam-status-dot');
  const txt = document.getElementById('cam-overlay-txt');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: currentFacing,
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });
    const video = document.getElementById('cam-video');
    video.srcObject = camStream;
    dot.className = 'on';
    txt.textContent = `Live · ${currentMode} mode · ${currentFacing === 'environment' ? 'Back' : 'Front'} camera`;
  } catch(e) {
    dot.className = '';
    txt.textContent = 'Camera unavailable — allow camera permission';
    toast('Allow camera access in browser settings.');
  }
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
}

function stopAnalyze() {
  stopCamera(); clearCooldown(); go('s-home');
}

// ── Flip between front and back camera ─────────────────
async function flipCamera() {
  currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
  const btn = document.getElementById('flip-btn');
  btn.style.opacity = '0.5';
  await startCamera();
  btn.style.opacity = '1';
  const txt = document.getElementById('cam-overlay-txt');
  txt.textContent = `Live · ${currentMode} · ${currentFacing === 'environment' ? 'Back' : 'Front'} camera`;
}

// ── Capture frame as base64 JPEG ────────────────────────
function captureFrame() {
  const video  = document.getElementById('cam-video');
  const canvas = document.getElementById('cam-canvas');
  canvas.width  = 640; canvas.height = 480;
  canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
  return canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
}

// ══════════════════════════════════════════════════════════════
// TTS  (replaces pyttsx3)
// ══════════════════════════════════════════════════════════════
const synth = window.speechSynthesis;
function speak(text) {
  synth.cancel();
  if (!text?.trim()) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.0; u.volume = 1.0; u.lang = 'en-IN';
  synth.speak(u);
}

// ══════════════════════════════════════════════════════════════
// MODE TOGGLE
// ══════════════════════════════════════════════════════════════
function toggleMode() {
  currentMode = currentMode === 'Indoor' ? 'Outdoor' : 'Indoor';
  const btn = document.getElementById('mode-btn');
  btn.textContent = currentMode.toUpperCase();
  btn.style.background = currentMode === 'Indoor' ? 'var(--o)' : 'var(--b)';
  document.getElementById('cam-overlay-txt').textContent =
    `Live · ${currentMode} · ${currentFacing === 'environment' ? 'Back' : 'Front'} camera`;
  speak(`Switched to ${currentMode} mode.`);
}

// ══════════════════════════════════════════════════════════════
// OBSTACLE DETECTION
// ══════════════════════════════════════════════════════════════
const FWD = ['ahead','in front','directly','blocking','in your path','in the path','center'];
const OBS = ['chair','table','door','step','stairs','wall','person','pole','box',
             'bag','cable','kerb','barrier','pillar','vehicle','car','bike','bicycle'];

function hasObstacle(desc) {
  const d = (desc||'').toLowerCase();
  return FWD.some(m => d.includes(m)) && OBS.some(t => d.includes(t));
}

// ══════════════════════════════════════════════════════════════
// AI ANALYZE
// ══════════════════════════════════════════════════════════════
async function runAI() {
  if (isBusy) return;
  isBusy = true;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true; btn.textContent = 'THINKING…'; btn.style.background = '#555';
  setStatus('Analyzing scene…');

  const img = captureFrame();
  if (!img) { speak('Camera read failed.'); resetAI(3); return; }

  try {
    const res    = await api('/api/analyze', { image: img, mode: currentMode });
    const result = res.result || '';

    if (result === 'BUSY') {
      speak('API quota reached. Please wait 35 seconds.');
      setStatus('⏳ Quota limit — wait 35s');
      resetAI(35);
    } else if (!result || result === 'ERROR') {
      speak('Analysis failed. Try again.');
      setStatus('Analysis failed');
      resetAI(3);
    } else {
      if (hasObstacle(result)) {
        speak('Warning! Obstacle ahead. ' + result);
        setStatus('⚠️ OBSTACLE DETECTED');
      } else {
        speak(result);
        setStatus('✓ ' + result.slice(0, 60));
      }
      resetAI(5);
      // Track location silently
      navigator.geolocation?.getCurrentPosition(
        pos => api('/api/track', { userId: currentUser, lat: pos.coords.latitude, lon: pos.coords.longitude }).catch(()=>{}),
        ()  => api('/api/track', { userId: currentUser, lat: 17.385, lon: 78.4867 }).catch(()=>{})
      );
    }
  } catch(e) {
    speak('Server error. Check connection.');
    setStatus('Server error');
    resetAI(3);
  }
}

function setStatus(txt) { document.getElementById('a-status').textContent = txt; }

function clearCooldown() { if (cdTimer) { clearInterval(cdTimer); cdTimer = null; } }

function resetAI(secs) {
  isBusy = false; clearCooldown();
  const btn = document.getElementById('analyze-btn');
  if (secs <= 0) {
    btn.disabled = false; btn.textContent = 'ANALYZE'; btn.style.background = 'var(--g)'; return;
  }
  let rem = secs;
  btn.textContent = `Wait ${rem}s`; btn.style.background = '#555';
  cdTimer = setInterval(() => {
    rem--;
    if (rem <= 0) {
      clearCooldown();
      btn.disabled = false; btn.textContent = 'ANALYZE'; btn.style.background = 'var(--g)';
    } else btn.textContent = `Wait ${rem}s`;
  }, 1000);
}

// ══════════════════════════════════════════════════════════════
// VOICE MIC  (replaces SpeechRecognition)
// ══════════════════════════════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function listenFor(purpose) {
  if (!SR) { toast('Speech recognition needs Chrome browser.'); return; }
  if (isListening) return;
  isListening = true;

  const micBtn = purpose === 'dest'
    ? document.getElementById('mic-dest-btn')
    : document.getElementById('mic-analyze-btn');
  micBtn.classList.add('mic-active');
  micBtn.textContent = '…';

  const r = new SR();
  r.lang = 'en-IN'; r.interimResults = false; r.maxAlternatives = 1;

  r.onresult = e => {
    const text = e.results[0][0].transcript.toLowerCase();
    isListening = false;
    micBtn.classList.remove('mic-active'); micBtn.textContent = '🎤';

    if (purpose === 'dest') {
      document.getElementById('a-dest').value = text;
      speak(`Destination set to ${text}. Press GO to navigate.`);
    } else {
      const triggers = ['analyze','scan','describe','look','check','scene','what'];
      if (triggers.some(t => text.includes(t))) { setStatus('Voice command — analyzing…'); runAI(); }
      else { speak('Say analyze to scan the scene.'); }
    }
  };

  r.onerror = () => {
    isListening = false;
    micBtn.classList.remove('mic-active'); micBtn.textContent = '🎤';
    speak('Could not hear. Try again.');
  };

  speak(purpose === 'dest' ? 'Say your destination.' : 'Say analyze to scan the scene.');
  r.start();
}

// ══════════════════════════════════════════════════════════════
// NAVIGATION  — calls /api/nav on server (keeps Maps key hidden)
// ══════════════════════════════════════════════════════════════
async function getNav() {
  const dest = document.getElementById('a-dest').value.trim();
  if (!dest) { speak('Please type or say a destination first.'); return; }

  const btn = document.getElementById('go-btn');
  btn.disabled = true; btn.textContent = '…';
  setStatus(`Getting directions to ${dest}…`);
  speak(`Getting directions to ${dest}`);

  // Get GPS
  let origin = '17.3850,78.4867';
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 }));
    origin = `${pos.coords.latitude},${pos.coords.longitude}`;
  } catch(e) {
  setStatus('GPS unavailable — using default location Hyderabad');
  speak('Could not get your location. Using default location.');
}

  try {
    // Always call through your server — keeps Maps key secret and avoids CORS
    const r    = await fetch(`${SERVER}/api/nav?origin=${origin}&destination=${encodeURIComponent(dest)}`);
    const data = await r.json();
    handleNavResult(data, dest);
  } catch(e) {
    speak('Navigation error. Check server connection.');
    setStatus('Navigation failed');
  }

  btn.disabled = false; btn.textContent = 'GO';
}

function handleNavResult(data, dest) {
  if (data.status === 'OK') {
    const steps = data.routes[0].legs[0].steps.slice(0, 3);
    let speech  = `Directions to ${dest}. `;
    steps.forEach((s, i) => {
      const instr = s.html_instructions.replace(/<[^>]+>/g, '');
      speech += `Step ${i+1}: ${instr} for ${s.distance.text}. `;
    });
    speak(speech);
    const first = data.routes[0].legs[0].steps[0].html_instructions.replace(/<[^>]+>/g,'');
    setStatus(`Route: ${first}`);
  } else if (data.status === 'REQUEST_DENIED') {
    speak('Maps API key invalid or Directions API not enabled. Check Google Cloud Console.');
    setStatus('Maps key error — check Railway variables');
  } else if (data.status === 'ZERO_RESULTS') {
    speak(`No walking route found to ${dest}.`);
  } else {
    speak(`Navigation failed: ${data.status}`);
  }
}

// ══════════════════════════════════════════════════════════════
// SOS
// ══════════════════════════════════════════════════════════════
async function triggerSOS() {
  const btn = document.getElementById('sos-btn');
  btn.disabled = true; btn.textContent = 'SENDING…'; btn.classList.add('sos-ring');
  speak('S O S alert triggered. Sending emergency email.');

  let lat = 17.385, lon = 78.4867;
  try {
    const pos = await new Promise((res,rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 3000 }));
    lat = pos.coords.latitude; lon = pos.coords.longitude;
  } catch {}

  try {
    const res = await api('/api/sos', {
      user: currentUser, emergency_contact: emergencyContact, lat, lon
    });
    if (res.ok) {
      speak('S O S email sent. Help is on the way.');
      btn.textContent = 'SENT ✓'; btn.style.background = 'var(--g)';
      setTimeout(() => {
        btn.disabled = false; btn.textContent = 'SOS';
        btn.style.background = 'var(--r)'; btn.classList.remove('sos-ring');
      }, 8000);
    } else {
      speak('SOS email failed. Check email settings on server.');
      btn.disabled = false; btn.textContent = 'SOS'; btn.classList.remove('sos-ring');
    }
  } catch {
    speak('SOS failed. Server unreachable.');
    btn.disabled = false; btn.textContent = 'SOS'; btn.classList.remove('sos-ring');
  }
}

// ══════════════════════════════════════════════════════════════
// CAREGIVER TRACKING
// ══════════════════════════════════════════════════════════════
async function fetchTrack() {
  const uid = document.getElementById('c-uid').value.trim();
  if (!uid) { toast('Enter a username.'); return; }
  const card = document.getElementById('c-info-card');
  try {
    const data = await apiGet(`/api/track/${uid}`);
    if (data && data.length > 0) {
      const d = data[0];
      card.innerHTML = `
        <div class="info-row"><span class="info-key">User</span><span class="info-val">${uid}</span></div>
        <div class="info-row"><span class="info-key">Latitude</span><span class="info-val">${d.lat}</span></div>
        <div class="info-row"><span class="info-key">Longitude</span><span class="info-val">${d.lon}</span></div>
        <div class="info-row"><span class="info-key">Last seen</span><span class="info-val" style="font-size:12px">${d.timestamp}</span></div>
        <div class="info-row"><span class="info-key">Status</span><span class="online-badge">● Online</span></div>`;
      const map = document.getElementById('care-map');
      map.src = `https://maps.google.com/maps?q=${d.lat},${d.lon}&z=16&output=embed`;
      map.style.display = 'block';
    } else {
      card.innerHTML = `<div style="color:var(--dim);font-size:14px;text-align:center;padding:10px 0">No data for "<b style="color:var(--txt)">${uid}</b>".<br/>Use the app first to send location.</div>`;
      document.getElementById('care-map').style.display = 'none';
    }
  } catch {
    card.innerHTML = `<div style="color:var(--r);font-size:13px;text-align:center">Server unreachable. Make sure server.py is running.</div>`;
  }
}

let autoOn = false;
function toggleAutoRefresh() {
  const btn = document.getElementById('auto-btn');
  if (autoOn) {
    clearInterval(autoRefreshTimer); autoOn = false;
    btn.style.background = 'var(--b)'; btn.style.color = '#fff'; btn.textContent = 'AUTO';
  } else {
    autoOn = true;
    btn.style.background = 'var(--g)'; btn.style.color = '#000'; btn.textContent = 'LIVE ●';
    fetchTrack();
    autoRefreshTimer = setInterval(fetchTrack, 5000);
  }
}

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}
